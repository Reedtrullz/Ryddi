name: Release Preview Artifact

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Signed release tag to check out (must equal v<version>)
        required: true
        default: v0.4.1
        type: string
      version:
        description: Bundle and artifact version
        required: true
        default: 0.4.1
        type: string
      build_number:
        description: Monotonic bundle build number
        required: true
        default: "6"
        type: string

jobs:
  developer-preview:
    name: Build unsigned developer preview
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Release check
        env:
          RYDDI_E2E_MIN_FREE_GIB: "5"
        run: Scripts/release-check.sh

      - name: Upload developer preview artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Ryddi-developer-preview
          if-no-files-found: error
          path: |
            dist/Ryddi-developer-preview.zip
            dist/Ryddi-developer-preview.zip.sha256
            dist/Ryddi-release-manifest.txt

  signed-release:
    name: Build signed notarized release
    runs-on: [self-hosted, macOS, ryddi-release]
    if: ${{ vars.RYDDI_ENABLE_SIGNED_RELEASE == 'true' }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0

      - name: Verify immutable release provenance
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
          RYDDI_VERSION: ${{ inputs.version }}
          RYDDI_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          [[ "$RYDDI_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$RYDDI_BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]
          test "$RELEASE_REF" = "v$RYDDI_VERSION"
          test "$(git rev-parse HEAD)" = "$(git rev-parse "$RELEASE_REF^{commit}")"
          test -z "$(git status --porcelain --untracked-files=normal)"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          keychain="$RUNNER_TEMP/ryddi-build.keychain-db"
          p12="$RUNNER_TEMP/ryddi-developer-id.p12"
          previous="$RUNNER_TEMP/ryddi-previous-default-keychain"
          security default-keychain -d user >"$previous"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security default-keychain -d user -s "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode >"$p12"
          security import "$p12" -k "$keychain" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain"

      - name: Signed release check
        env:
          RYDDI_RELEASE_SIGNING: required
          RYDDI_ARTIFACT_BASENAME: Ryddi-v${{ inputs.version }}
          RYDDI_VERSION: ${{ inputs.version }}
          RYDDI_BUILD_NUMBER: ${{ inputs.build_number }}
          RYDDI_REQUIRE_PACKAGED_AX_E2E: "1"
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: Scripts/release-check.sh

      - name: Generate signed update feed
        env:
          RYDDI_SPARKLE_KEY_ACCOUNT: ed25519
          RYDDI_SPARKLE_PRIVATE_KEY: ${{ secrets.RYDDI_SPARKLE_PRIVATE_KEY }}
        run: |
          Scripts/generate-appcast.sh \
            "dist/Ryddi-v${{ inputs.version }}-update.zip" \
            dist/appcast.xml

      - name: Upload signed release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Ryddi-v${{ inputs.version }}-signed-notarized
          if-no-files-found: error
          path: |
            dist/Ryddi-v${{ inputs.version }}.zip
            dist/Ryddi-v${{ inputs.version }}.zip.sha256
            dist/Ryddi-v${{ inputs.version }}-update.zip
            dist/Ryddi-v${{ inputs.version }}-update.zip.sha256
            dist/Ryddi-release-manifest.txt
            dist/appcast.xml
            dist/e2e-proof

      - name: Remove signing credentials and restore keychain
        if: ${{ always() }}
        run: |
          set +e
          keychain="$RUNNER_TEMP/ryddi-build.keychain-db"
          p12="$RUNNER_TEMP/ryddi-developer-id.p12"
          previous="$RUNNER_TEMP/ryddi-previous-default-keychain"
          rm -f "$p12"
          if [[ -s "$previous" ]]; then
            prior="$(sed -e 's/^[[:space:]]*//' -e 's/^"//' -e 's/"$//' "$previous")"
            [[ -n "$prior" ]] && security default-keychain -d user -s "$prior"
          fi
          security delete-keychain "$keychain" >/dev/null 2>&1
          rm -f "$previous"
