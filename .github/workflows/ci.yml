name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build
        run: swift build --scratch-path "$PWD/.build"

      - name: Test
        run: swift test --scratch-path "$PWD/.build"

      - name: Fixture-backed app E2E smoke
        timeout-minutes: 10
        env:
          RYDDI_E2E_REQUIRE_SCREENSHOT: "0"
          RYDDI_E2E_MIN_FREE_GIB: "5"
        run: Scripts/app-e2e-smoke.sh
