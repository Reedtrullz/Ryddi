name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build
        run: swift build --scratch-path "$PWD/.build"

      - name: Test
        run: swift test --scratch-path "$PWD/.build"
